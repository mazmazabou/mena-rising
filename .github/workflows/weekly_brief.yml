name: Weekly Brief Update

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:             # Manual trigger

permissions:
  contents: write

jobs:
  generate-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Archive current brief
        working-directory: pipeline
        run: python run_pipeline.py --archive-only

      - name: Run pipeline
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python run_pipeline.py

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: pipeline/logs/
          retention-days: 14

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/latest_brief.json public/data/archive/ public/sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to brief or archive"
          else
            ISSUE=$(python3 -c "import json; print(json.load(open('public/data/latest_brief.json'))['issue']['number'])")
            git fetch origin main
            git reset --soft origin/main
            git commit -m "chore: weekly brief update — Issue #${ISSUE}"
            git push origin main
          fi

      - name: Send newsletter
        working-directory: pipeline
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
        run: python send_newsletter.py

      - name: Notify on failure
        if: failure()
        working-directory: pipeline
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python send_failure_alert.py --run-url "$RUN_URL"
